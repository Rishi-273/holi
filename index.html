<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi | Beautiful Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@500;700;800&family=Permanent+Marker&display=swap" rel="stylesheet">
</head>
<body>
    <div class="watercolor-bg" aria-hidden="true"></div>
    <div id="splash-container" aria-hidden="true"></div>
    <div id="falling-flowers-container" aria-hidden="true"></div>
    <div id="magic-container" aria-hidden="true"></div>

    <div class="card-perspective-wrapper">
        <main class="hero-section">
            <div class="elegant-glass-card" id="mainCard">
                
                <div class="magic-reveal-container">
                    <div class="photo-container">
                        <img id="profile-pic" class="profile-pic" src="file:///C:/Users/Rishi/Pictures/ppp.jpg" alt="Vidhi's Photo">
                        <div class="pic-glow-ring-1"></div>
                        <div class="pic-glow-ring-2"></div>
                        <div class="pic-decor decor-1">🌸</div>
                        <div class="pic-decor decor-2">✨</div>
                    </div>
                </div>

                <header>
                    <h2 class="pre-title">Wishing a very Happy Holi to...</h2>
                    
                    <div class="title-wrapper">
                        <h1 class="title" aria-live="polite">
                            <span id="typing-name" class="holi-text" data-text="Rishi">Rishi</span>
                            <span class="sparkle" id="sparkle"></span>
                        </h1>
                    </div>
                </header>
                
                <section class="content-wrapper">
                    <p class="intro-text">May your world always be painted with the softest, sweetest, and most beautiful colors. 🌸💖</p>
                    
                    <button id="revealBtn" class="cute-glow-btn" aria-label="Reveal secret message">
                        <span class="btn-text">Click for Holi Magic! ✨</span>
                        <div class="btn-glow"></div>
                    </button>

                    <div id="secretMessage" class="hidden-message" aria-hidden="true">
                        <p class="sweet-text">Bura na mano, Holi hai! May your life always be as bright, colorful, and joyous as you are. 💃🎨</p>
                        <p class="cheer-line">Happy Holi!</p>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
